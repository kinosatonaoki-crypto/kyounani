<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="上富田お天気">
<meta name="theme-color" content="#2986cc">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>今日何着ていく？ 上富田版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'YuGothic', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    background: linear-gradient(160deg, #1a6bb0 0%, #2986cc 35%, #56b3e8 70%, #87ceeb 100%);
    transition: background 1.5s ease;
    overflow-x: hidden;
  }

  #app { padding: 0 0 48px; min-height: 100vh; }

  /* ── Loading ── */
  #loading {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .loader-emoji { font-size: 64px; animation: float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-text { color: #fff; font-size: 16px; font-weight: 600; opacity: .9; letter-spacing: .5px; }

  /* ── Cards ── */
  .card {
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,.28);
    box-shadow: 0 8px 32px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.2);
    padding: 22px 18px;
    margin-bottom: 14px;
  }

  .stitle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    letter-spacing: .3px;
  }

  /* ── Hero ── */
  #hero {
    text-align: center;
    padding: 56px 20px 36px;
    padding-top: max(56px, env(safe-area-inset-top, 0px) + 40px);
  }
  .hero-loc   { font-size: 15px; color: rgba(255,255,255,.85); font-weight: 600; letter-spacing: 1px; margin-bottom: 10px; }
  .hero-emoji { font-size: 86px; line-height: 1; margin-bottom: 4px; }
  .hero-wlabel{ font-size: 17px; color: rgba(255,255,255,.85); margin-bottom: -4px; }
  .hero-temp  { font-size: 90px; font-weight: 100; color: #fff; line-height: 1.05; letter-spacing: -5px; margin: 4px 0; }
  .hero-feels { font-size: 16px; color: rgba(255,255,255,.72); margin-bottom: 12px; }
  .hero-range { font-size: 17px; color: rgba(255,255,255,.88); margin-bottom: 20px; }
  .hero-stats { display: flex; justify-content: center; gap: 32px; margin-top: 4px; }
  .hero-stat-icon { font-size: 24px; }
  .hero-stat-val  { font-size: 20px; font-weight: 700; color: #fff; }
  .hero-stat-lbl  { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 2px; }

  /* ── Tags ── */
  .tag {
    background: rgba(255,255,255,.22);
    border-radius: 22px;
    padding: 7px 16px;
    font-size: 14px;
    color: #fff;
    font-weight: 600;
    display: inline-block;
    margin: 3px 3px 3px 0;
  }

  /* ── Belongings ── */
  .belong-item { display: flex; align-items: center; margin-bottom: 12px; }
  .belong-item:last-child { margin-bottom: 0; }
  .belong-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-right: 12px; }
  .belong-txt  { font-size: 18px; color: #fff; }

  /* ── AI comment ── */
  .ai-text { font-size: 17px; color: rgba(255,255,255,.93); line-height: 1.95; }
  @keyframes shimmer { 0%,100%{opacity:.6} 50%{opacity:1} }
  .shimmer { animation: shimmer 1.5s infinite; color: rgba(255,255,255,.65); }

  /* ── Spots ── */
  .spot-card {
    background: rgba(255,255,255,.12);
    border-radius: 16px;
    padding: 16px;
    border: 1px solid rgba(255,255,255,.16);
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 10px;
  }
  .spot-card:last-child { margin-bottom: 0; }
  .spot-icon   { font-size: 38px; line-height: 1; flex-shrink: 0; }
  .spot-name   { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 5px; }
  .spot-reason { font-size: 14px; color: rgba(255,255,255,.77); line-height: 1.65; }

  /* ── Index grid ── */
  .idx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .idx-item  { background: rgba(255,255,255,.11); border-radius: 16px; padding: 16px 12px; text-align: center; }
  .idx-icon  { font-size: 28px; margin-bottom: 6px; }
  .idx-lbl   { font-size: 14px; color: rgba(255,255,255,.8); margin-bottom: 8px; }
  .star      { font-size: 19px; }

  /* ── Tomorrow ── */
  .tmr-range { margin-bottom: 10px; }
  .tmr-high  { font-size: 24px; font-weight: 700; color: #fff; }
  .tmr-sep   { color: rgba(255,255,255,.4); margin: 0 8px; }
  .tmr-low   { font-size: 19px; color: rgba(255,255,255,.82); }
  .tmr-diff  { font-size: 15px; color: rgba(255,255,255,.82); line-height: 1.8; }
  .tmr-hint  { margin-top: 8px; font-size: 14px; color: rgba(255,255,255,.7); }

  /* ── Footer ── */
  .footer {
    text-align: center;
    color: rgba(255,255,255,.38);
    font-size: 12px;
    margin-top: 10px;
    padding-bottom: max(8px, env(safe-area-inset-bottom, 0px));
  }

  /* ── Error ── */
  #error-view {
    display: none;
    min-height: 80vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    gap: 16px;
  }
  .err-icon  { font-size: 52px; }
  .err-title { font-size: 20px; font-weight: 700; color: #fff; }
  .err-body  { font-size: 15px; color: rgba(255,255,255,.78); line-height: 1.7; }
  .retry-btn {
    margin-top: 8px;
    background: rgba(255,255,255,.2);
    border: 1px solid rgba(255,255,255,.45);
    border-radius: 24px;
    color: #fff;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background .2s;
  }
  .retry-btn:active { background: rgba(255,255,255,.35); }

  /* ── Animations ── */
  .fade { opacity: 0; animation: fadeUp .7s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .d0{animation-delay:.02s} .d1{animation-delay:.14s} .d2{animation-delay:.24s}
  .d3{animation-delay:.34s} .d4{animation-delay:.44s} .d5{animation-delay:.54s}
  .d6{animation-delay:.64s}

  #content { display: none; padding: 0 14px; }
</style>
</head>
<body>
<div id="app">

  <div id="loading">
    <div class="loader-emoji">🌤️</div>
    <div class="spinner"></div>
    <div class="status-text" id="status-text">上富田町の天気を取得中...</div>
  </div>

  <div id="error-view">
    <div class="err-icon">⚠️</div>
    <div class="err-title">天気情報を取得できませんでした</div>
    <div class="err-body" id="err-body">インターネット接続を確認してから<br>もう一度お試しください。</div>
    <button class="retry-btn" onclick="location.reload()">再試行する</button>
  </div>

  <div id="content">
    <div id="hero" class="fade d0">
      <div class="hero-loc">📍 上富田町</div>
      <div class="hero-emoji"  id="h-emoji">—</div>
      <div class="hero-wlabel" id="h-wlabel">—</div>
      <div class="hero-temp"   id="h-temp">—°</div>
      <div class="hero-feels"  id="h-feels">体感 —℃</div>
      <div class="hero-range"  id="h-range">↑ —℃ | ↓ —℃</div>
      <div class="hero-stats">
        <div><div class="hero-stat-icon">💧</div><div class="hero-stat-val" id="h-hum">—</div><div class="hero-stat-lbl">湿度</div></div>
        <div><div class="hero-stat-icon">☔</div><div class="hero-stat-val" id="h-rain">—</div><div class="hero-stat-lbl">降水確率</div></div>
        <div><div class="hero-stat-icon">💨</div><div class="hero-stat-val" id="h-wind">—</div><div class="hero-stat-lbl">風速</div></div>
      </div>
    </div>

    <div class="card fade d1" id="card-outfit">
      <div class="stitle">👕 今日の服装</div>
      <div id="out-main" style="font-size:20px;font-weight:700;color:#fff;margin-bottom:6px">—</div>
      <div id="out-sub"  style="font-size:15px;color:rgba(255,255,255,.82);margin-bottom:14px">—</div>
      <div id="out-tags"></div>
    </div>

    <div class="card fade d2" id="card-belong" style="display:none">
      <div class="stitle">🎒 持ち物</div>
      <div id="belong-list"></div>
    </div>

    <div class="card fade d3">
      <div class="stitle">🤖 今日のひとこと</div>
      <div class="ai-text" id="ai-text"><span class="shimmer">AIコメントを生成中...</span></div>
    </div>

    <div class="card fade d4">
      <div class="stitle">📍 今日のおすすめスポット</div>
      <div id="spots-list"></div>
    </div>

    <div class="card fade d5">
      <div class="stitle">☀️ 今日の指数</div>
      <div class="idx-grid" id="idx-grid"></div>
    </div>

    <div class="card fade d6">
      <div class="stitle">🌅 明日の服装</div>
      <div class="tmr-range">
        <span class="tmr-high" id="tmr-high">—</span>
        <span class="tmr-sep">/</span>
        <span class="tmr-low"  id="tmr-low">—</span>
      </div>
      <div class="tmr-diff" id="tmr-diff">—</div>
      <div class="tmr-hint" id="tmr-hint">—</div>
    </div>

    <div class="footer" id="footer"></div>
  </div>

</div>

<script>
/* ── 定数 ─────────────────────── */
const LAT = 33.696;
const LON = 135.428;

/* ── ヘルパー ─────────────────── */
function isNight() { const h = new Date().getHours(); return h < 6 || h >= 18; }

function getBg(code, night) {
  if (night) return "linear-gradient(160deg,#0a0f2c 0%,#1a2356 40%,#2d1b6e 100%)";
  if ([61,63,65,80,81,82,95,96,99].includes(code)) return "linear-gradient(160deg,#2c3a4a 0%,#3d5166 40%,#4a6080 100%)";
  if (code === 3 || [45,48].includes(code)) return "linear-gradient(160deg,#4a4e5a 0%,#5c6272 40%,#6e7585 100%)";
  if (code === 2) return "linear-gradient(160deg,#2a5a8a 0%,#4272a0 40%,#6090b8 100%)";
  return "linear-gradient(160deg,#1a6bb0 0%,#2986cc 35%,#56b3e8 70%,#87ceeb 100%)";
}
function getAccent(code, night) {
  if (night) return "#a78bfa";
  if ([61,63,65,80,81,82,95,96,99].includes(code)) return "#93c5fd";
  return "#fbbf24";
}
function wEmoji(c) {
  if (c===0) return "☀️"; if (c===1) return "🌤️"; if (c===2) return "⛅"; if (c===3) return "☁️";
  if ([45,48].includes(c)) return "🌫️"; if ([51,53,55].includes(c)) return "🌦️";
  if ([61,63,65,80,81,82].includes(c)) return "🌧️"; if ([71,73,75].includes(c)) return "❄️";
  if ([95,96,99].includes(c)) return "⛈️"; return "🌤️";
}
function wLabel(c) {
  const m={0:"快晴",1:"晴れ",2:"晴れ時々曇り",3:"曇り",45:"霧",48:"霧",51:"霧雨",53:"霧雨",55:"霧雨",61:"雨",63:"雨",65:"雨",80:"にわか雨",81:"にわか雨",82:"にわか雨",71:"雪",73:"雪",75:"雪",95:"雷雨",96:"雷雨",99:"雷雨"};
  return m[c] || "くもり";
}
function isRainy(c) { return [51,53,55,61,63,65,66,67,80,81,82,95,96,99].includes(c); }

function getOutfit(temp, rain, wind) {
  let clothes=[], items=[];
  if (temp>=30)      { clothes=["半袖","帽子"];              items=["水分補給","日焼け止め"]; }
  else if (temp>=25) { clothes=["半袖","薄手の羽織り"];        items=["水分補給"]; }
  else if (temp>=20) { clothes=["長袖 または 半袖＋羽織り"];   items=["薄手のカーディガン"]; }
  else if (temp>=15) { clothes=["長袖","薄手ジャケット"];      items=[]; }
  else if (temp>=10) { clothes=["ニット","ジャケット"];        items=["マフラー"]; }
  else               { clothes=["コート","厚手の服"];          items=["手袋","マフラー"]; }
  if (rain >= 40) items.push("折りたたみ傘");
  if (wind >= 8)  items.push("風を通しにくい上着");
  return { clothes, items };
}
function outLabel(t) {
  if (t>=30) return "半袖がおすすめです"; if (t>=25) return "半袖で快適に過ごせます";
  if (t>=20) return "長袖または半袖に羽織りを"; if (t>=15) return "長袖とジャケットがあると安心";
  if (t>=10) return "しっかり温かい服装で"; return "コートが必要な寒さです";
}
function subLabel(t, r) {
  if (r>=40) return "雨の準備もお忘れなく"; if (t>=30) return "日中は特に熱中症に注意を";
  if (t>=25) return "朝晩は薄手の羽織りがあると安心"; if (t>=20) return "日中との寒暖差に注意を";
  if (t>=15) return "朝晩は肌寒くなります"; return "外出時は防寒対策をしっかりと";
}

const SPOTS = {
  hot:      [{n:"道の駅 くちくまの",r:"涼しい館内でゆっくり休めます",i:"🏪"},{n:"彦五郎公園",r:"木陰で涼みながらお散歩できます",i:"🌳"},{n:"ジェラート店（富田川沿い）",r:"冷たいスイーツで涼をとりましょう",i:"🍦"}],
  pleasant: [{n:"富田川河川敷",r:"川沿いのさわやかな風が気持ちいい日です",i:"🏞️"},{n:"岡川八幡神社",r:"静かな境内でゆったり参拝できます",i:"⛩️"},{n:"ウォーキングコース",r:"絶好のウォーキング日和です",i:"🚶"}],
  rainy:    [{n:"上富田町立図書館",r:"雨の日はゆっくり読書を楽しみましょう",i:"📚"},{n:"上富田文化会館",r:"屋内で文化・芸術に触れられます",i:"🎭"},{n:"町内のカフェ",r:"温かい飲み物でほっとひと息つきましょう",i:"☕"}],
  cold:     [{n:"温かい食事ができる飲食店",r:"体の芯から温まりましょう",i:"🍜"},{n:"道の駅 くちくまの",r:"温かい地元グルメが楽しめます",i:"🏪"},{n:"上富田文化会館",r:"屋内でのんびり過ごせます",i:"🎭"}],
};
function getSpots(t, c) { if(isRainy(c)) return SPOTS.rainy; if(t>=27) return SPOTS.hot; if(t<=12) return SPOTS.cold; return SPOTS.pleasant; }

function getIdx(t, c, w, h) {
  const r = isRainy(c);
  return {
    hs: t>=35?5:t>=32?4:t>=28?3:t>=24?2:1,
    la: r?1:h>80?2:w>5?5:t>22?4:3,
    wk: r?1:t>=35?2:t>=30?3:t>=12?5:3,
    ex: r?2:t>=33?1:t>=28?3:t>=10?5:3,
  };
}
function starsHTML(n, color) {
  let s=""; for(let i=1;i<=5;i++) s+=`<span class="star" style="color:${i<=n?color:"rgba(255,255,255,.2)"}">\u2605</span>`; return s;
}

function setStatus(txt) { const el=document.getElementById("status-text"); if(el) el.textContent=txt; }

/* ── AI コメント (フォールバック) ── */
function aiCommentFallback(w) {
  if (isRainy(w.code)) return "今日は雨が降っています。外出の際は傘をお持ちください。室内でゆっくりお過ごしいただくのもいいですね。";
  if (w.temp >= 30) return `今日は${w.temp}℃と暑い一日です。熱中症に十分注意して、こまめに水分補給をしてください。なるべく涼しい時間帯に外出されることをおすすめします。`;
  if (w.temp >= 22) return `今日は${wLabel(w.code)}で過ごしやすい陽気です。散歩や買い物にぴったりの一日ですよ。水分補給もお忘れなく。`;
  if (w.temp >= 15) return `今日は少し肌寒くなっています。薄手の上着を一枚持って出かけると安心です。天気は${wLabel(w.code)}です。`;
  return `今日は気温が${w.temp}℃と冷え込んでいます。しっかり温かい服装でお出かけください。温かい飲み物で体を温めながら、ゆったりお過ごしください。`;
}

/* ── 天気取得 ─────────────────── */
async function fetchWeather() {
  const url =
    `https://api.open-meteo.com/v1/forecast` +
    `?latitude=${LAT}&longitude=${LON}` +
    `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m` +
    `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max` +
    `&timezone=Asia%2FTokyo&forecast_days=2`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`天気 API エラー (HTTP ${res.status})`);
  return res.json();
}

/* ── AI コメント取得 ─────────── */
async function fetchAIComment(w) {
  try {
    const res = await fetch("/api/comment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ weatherData: w }),
    });
    if (!res.ok) throw new Error("api/comment error");
    const data = await res.json();
    return data.comment || aiCommentFallback(w);
  } catch {
    return aiCommentFallback(w);
  }
}

/* ── 描画 ─────────────────────── */
function renderWeather(w) {
  const night = isNight();
  document.body.style.background = getBg(w.code, night);
  const acc = getAccent(w.code, night);

  document.getElementById("h-emoji").textContent  = wEmoji(w.code);
  document.getElementById("h-wlabel").textContent = wLabel(w.code);
  document.getElementById("h-temp").textContent   = w.temp + "°";
  document.getElementById("h-feels").textContent  = "体感 " + w.feels + "℃";
  document.getElementById("h-range").innerHTML    = "↑ " + w.maxTemp + "℃ &nbsp;|&nbsp; ↓ " + w.minTemp + "℃";
  document.getElementById("h-hum").textContent    = w.hum + "%";
  document.getElementById("h-rain").textContent   = w.rain + "%";
  document.getElementById("h-wind").textContent   = w.wind + "m/s";

  const outfit = getOutfit(w.temp, w.rain, w.wind);
  document.getElementById("out-main").textContent = outLabel(w.temp);
  document.getElementById("out-sub").textContent  = subLabel(w.temp, w.rain);
  document.getElementById("out-tags").innerHTML   = outfit.clothes.map(c => `<span class="tag">👔 ${c}</span>`).join("");

  const belongCard = document.getElementById("card-belong");
  if (outfit.items.length > 0) {
    belongCard.style.display = "";
    document.getElementById("belong-list").innerHTML = outfit.items
      .map(it => `<div class="belong-item"><span class="belong-dot" style="background:${acc}"></span><span class="belong-txt">${it}</span></div>`)
      .join("");
  } else {
    belongCard.style.display = "none";
  }

  const spots = getSpots(w.maxTemp, w.code);
  document.getElementById("spots-list").innerHTML = spots
    .map(s => `<div class="spot-card"><div class="spot-icon">${s.i}</div><div><div class="spot-name">${s.n}</div><div class="spot-reason">${s.r}</div></div></div>`)
    .join("");

  const idx = getIdx(w.temp, w.code, w.wind, w.hum);
  document.getElementById("idx-grid").innerHTML = [
    ["🌡️","熱中症",idx.hs,"#f87171"],
    ["🧺","洗濯",  idx.la,"#60a5fa"],
    ["🚶","散歩",  idx.wk,"#34d399"],
    ["🏃","運動",  idx.ex,"#fbbf24"],
  ].map(([ic,lb,v,c]) =>
    `<div class="idx-item"><div class="idx-icon">${ic}</div><div class="idx-lbl">${lb}</div><div>${starsHTML(v,c)}</div></div>`
  ).join("");

  const diff = w.tMax2 - w.maxTemp;
  const diffTxt = diff > 0 ? `明日は今日より${Math.abs(diff)}℃高くなります。`
                : diff < 0 ? `明日は今日より${Math.abs(diff)}℃低くなります。`
                : "明日は今日とほぼ同じ気温です。";
  document.getElementById("tmr-high").textContent = "↑ " + w.tMax2 + "℃";
  document.getElementById("tmr-low").textContent  = "↓ " + w.tMin2 + "℃";
  document.getElementById("tmr-diff").textContent = diffTxt;
  document.getElementById("tmr-hint").textContent = outLabel(w.tMax2) + "の予定でご準備ください。";

  const now = new Date().toLocaleString("ja-JP", { month:"long", day:"numeric", hour:"2-digit", minute:"2-digit" });
  document.getElementById("footer").textContent = "Open-Meteo · " + now + " 取得";
}

/* ── メイン ──────────────────── */
async function init() {
  try {
    setStatus("上富田町の天気を取得中...");
    const data  = await fetchWeather();
    const cur   = data.current;
    const daily = data.daily;
    const w = {
      temp:    Math.round(cur.temperature_2m),
      feels:   Math.round(cur.apparent_temperature),
      hum:     Math.round(cur.relative_humidity_2m),
      code:    cur.weather_code,
      wind:    Math.round(cur.wind_speed_10m * 10) / 10,
      maxTemp: Math.round(daily.temperature_2m_max[0]),
      minTemp: Math.round(daily.temperature_2m_min[0]),
      rain:    daily.precipitation_probability_max[0],
      tMax2:   Math.round(daily.temperature_2m_max[1]),
      tMin2:   Math.round(daily.temperature_2m_min[1]),
    };

    renderWeather(w);
    document.getElementById("loading").style.display  = "none";
    document.getElementById("content").style.display  = "block";

    setStatus("AIコメントを生成中...");
    const aiText = await fetchAIComment(w);
    const aiEl   = document.getElementById("ai-text");
    if (aiEl) aiEl.textContent = aiText;

  } catch (e) {
    document.getElementById("loading").style.display = "none";
    const ev = document.getElementById("error-view");
    ev.style.display = "flex";
    document.getElementById("err-body").textContent =
      "インターネット接続を確認してください。\n(" + (e.message || "不明なエラー") + ")";
  }
}

/* ── Service Worker 登録 (PWA) ─ */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}

init();
</script>
