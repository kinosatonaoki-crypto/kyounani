<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">

<title>今日何着てく？ in 上富田</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'YuGothic', 'Noto Sans JP', sans-serif;
  min-height: 100vh; min-height: 100dvh;
  background: linear-gradient(160deg,#1a6bb0 0%,#2986cc 35%,#56b3e8 70%,#87ceeb 100%);
  transition: background 1.5s ease; overflow-x: hidden;
}
#app { padding: 0 0 56px; min-height: 100vh; }

/* Loading */
#loading { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
.loader-emoji { font-size:64px; animation:float 2s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.status-text { color:#fff; font-size:16px; font-weight:600; opacity:.9; }

/* Cards */
.card {
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-radius:22px; border:1px solid rgba(255,255,255,.28);
  box-shadow: 0 8px 32px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.2);
  padding:22px 18px; margin-bottom:14px;
}
.stitle { display:flex; align-items:center; gap:8px; margin-bottom:14px; font-size:17px; font-weight:700; color:#fff; letter-spacing:.3px; }

/* Hero */
#hero {
  text-align:center; padding:48px 20px 32px;
  padding-top: max(48px, env(safe-area-inset-top,0px) + 36px);
}
.app-title { font-size:13px; color:rgba(255,255,255,.75); font-weight:600; letter-spacing:2px; margin-bottom:4px; }
.hero-loc { font-size:18px; color:#fff; font-weight:700; letter-spacing:.5px; margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:6px; }
.hero-emoji { font-size:80px; line-height:1; margin-bottom:4px; }
.hero-wlabel { font-size:17px; color:rgba(255,255,255,.88); margin-bottom:-4px; }
.hero-temp { font-size:88px; font-weight:100; color:#fff; line-height:1.05; letter-spacing:-5px; margin:4px 0; }
.hero-feels { font-size:16px; color:rgba(255,255,255,.7); margin-bottom:10px; }
.hero-range { font-size:17px; color:rgba(255,255,255,.88); margin-bottom:20px; }
.hero-stats { display:flex; justify-content:center; gap:28px; margin-top:4px; }
.hero-stat-icon { font-size:22px; }
.hero-stat-val { font-size:19px; font-weight:700; color:#fff; }
.hero-stat-lbl { font-size:12px; color:rgba(255,255,255,.65); margin-top:2px; }

/* ===== 服装カード（大型・目立つ） ===== */
#card-outfit {
  background: rgba(255,255,255,.22);
  border:2px solid rgba(255,255,255,.45);
  box-shadow: 0 12px 40px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.3);
  padding: 20px 16px 18px;
}
.outfit-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.outfit-title-block { display:flex; align-items:center; gap:8px; }
.outfit-main-label { font-size:22px; font-weight:800; color:#fff; letter-spacing:-.3px; }
.outfit-sub-label { font-size:14px; color:rgba(255,255,255,.8); margin-top:3px; }

/* 寒がり・暑がり 2カラム */
.outfit-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.outfit-col {
  background: rgba(255,255,255,.14);
  border-radius:16px; border:1px solid rgba(255,255,255,.22);
  padding:14px 12px;
}
.outfit-col-title { font-size:13px; font-weight:700; color:rgba(255,255,255,.9); margin-bottom:10px; display:flex; align-items:center; gap:5px; letter-spacing:.3px; }
.outfit-col-title.cold-type { color:#bfdbfe; }
.outfit-col-title.hot-type  { color:#fde68a; }
.outfit-item {
  display:flex; align-items:center; gap:7px;
  background:rgba(255,255,255,.15); border-radius:20px;
  padding:7px 11px; margin-bottom:6px; font-size:14px; font-weight:600; color:#fff;
}
.outfit-item:last-child { margin-bottom:0; }
.outfit-item-icon { font-size:16px; flex-shrink:0; }

/* 持ち物 */
.belong-item { display:flex; align-items:center; margin-bottom:12px; }
.belong-item:last-child { margin-bottom:0; }
.belong-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; margin-right:12px; }
.belong-txt { font-size:18px; color:#fff; }

/* AI comment */
.ai-card { background: rgba(30,10,60,.3); border:1px solid rgba(255,255,255,.2); }
.ai-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.ai-badge { background:rgba(167,139,250,.35); border-radius:20px; padding:4px 12px; font-size:12px; font-weight:700; color:#e9d5ff; letter-spacing:.5px; }
.ai-text { font-size:17px; color:rgba(255,255,255,.95); line-height:2; }
@keyframes shimmer { 0%,100%{opacity:.6} 50%{opacity:1} }
.shimmer { animation:shimmer 1.5s infinite; color:rgba(255,255,255,.6); }

/* Spots */
.spot-card {
  background:rgba(255,255,255,.12); border-radius:16px; padding:14px;
  border:1px solid rgba(255,255,255,.16); display:flex; align-items:flex-start; gap:14px; margin-bottom:10px;
}
.spot-card:last-child { margin-bottom:0; }
.spot-icon { font-size:36px; line-height:1; flex-shrink:0; }
.spot-name { font-size:16px; font-weight:700; color:#fff; margin-bottom:4px; }
.spot-reason { font-size:14px; color:rgba(255,255,255,.77); line-height:1.6; }

/* 上富田情報 */
.info-card { background:rgba(0,60,20,.25); border:1px solid rgba(120,255,150,.2); }
.info-item { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid rgba(255,255,255,.1); }
.info-item:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
.info-icon { font-size:28px; flex-shrink:0; margin-top:2px; }
.info-title { font-size:14px; font-weight:700; color:#86efac; margin-bottom:3px; }
.info-body { font-size:13px; color:rgba(255,255,255,.8); line-height:1.65; }

/* Index grid */
.idx-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.idx-item { background:rgba(255,255,255,.11); border-radius:16px; padding:14px 12px; text-align:center; }
.idx-icon { font-size:26px; margin-bottom:5px; }
.idx-lbl { font-size:14px; color:rgba(255,255,255,.8); margin-bottom:7px; }
.star { font-size:18px; }

/* Tomorrow */
.tmr-range { margin-bottom:10px; }
.tmr-high { font-size:24px; font-weight:700; color:#fff; }
.tmr-sep { color:rgba(255,255,255,.4); margin:0 8px; }
.tmr-low { font-size:19px; color:rgba(255,255,255,.82); }
.tmr-diff { font-size:15px; color:rgba(255,255,255,.82); line-height:1.8; }
.tmr-hint { margin-top:8px; font-size:14px; color:rgba(255,255,255,.7); }

/* Hyoutan-senpai mascot SVG */
.mascot { display:inline-block; }
.mascot-float { animation:float 3s ease-in-out infinite; }
.mascot-bounce { animation:bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-6px) rotate(3deg)} }

/* Footer */
.footer { text-align:center; color:rgba(255,255,255,.38); font-size:12px; margin-top:10px; padding-bottom:max(8px,env(safe-area-inset-bottom,0px)); }

/* Error */
#error-view { display:none; min-height:80vh; flex-direction:column; align-items:center; justify-content:center; padding:32px; text-align:center; gap:16px; }
.err-icon { font-size:52px; }
.err-title { font-size:20px; font-weight:700; color:#fff; }
.err-body { font-size:15px; color:rgba(255,255,255,.78); line-height:1.7; }
.retry-btn { margin-top:8px; background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.45); border-radius:24px; color:#fff; padding:12px 30px; font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; }

/* Animations */
.fade { opacity:0; animation:fadeUp .7s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
.d0{animation-delay:.02s}.d1{animation-delay:.12s}.d2{animation-delay:.22s}
.d3{animation-delay:.32s}.d4{animation-delay:.42s}.d5{animation-delay:.52s}
.d6{animation-delay:.62s}.d7{animation-delay:.72s}

#content { display:none; padding:0 14px; }
</style>
</head>

<script>
const LAT = 33.696, LON = 135.428;

function isNight() { const h = new Date().getHours(); return h < 6 || h >= 18; }

function getBg(code, night) {
  if (night) return "linear-gradient(160deg,#0a0f2c 0%,#1a2356 40%,#2d1b6e 100%)";
  if ([61,63,65,80,81,82,95,96,99].includes(code)) return "linear-gradient(160deg,#2c3a4a,#3d5166 40%,#4a6080)";
  if (code===3||[45,48].includes(code)) return "linear-gradient(160deg,#4a4e5a,#5c6272 40%,#6e7585)";
  if (code===2) return "linear-gradient(160deg,#2a5a8a,#4272a0 40%,#6090b8)";
  return "linear-gradient(160deg,#1a6bb0,#2986cc 35%,#56b3e8 70%,#87ceeb)";
}
function getAccent(code, night) {
  if (night) return "#a78bfa";
  if ([61,63,65,80,81,82,95,96,99].includes(code)) return "#93c5fd";
  return "#fbbf24";
}
function wEmoji(c) {
  if(c===0)return"☀️";if(c===1)return"🌤️";if(c===2)return"⛅";if(c===3)return"☁️";
  if([45,48].includes(c))return"🌫️";if([51,53,55].includes(c))return"🌦️";
  if([61,63,65,80,81,82].includes(c))return"🌧️";if([71,73,75].includes(c))return"❄️";
  if([95,96,99].includes(c))return"⛈️";return"🌤️";
}
function wLabel(c) {
  const m={0:"快晴",1:"晴れ",2:"晴れ時々曇り",3:"曇り",45:"霧",48:"霧",51:"霧雨",53:"霧雨",55:"霧雨",
    61:"雨",63:"雨",65:"雨",80:"にわか雨",81:"にわか雨",82:"にわか雨",71:"雪",73:"雪",75:"雪",95:"雷雨",96:"雷雨",99:"雷雨"};
  return m[c]||"くもり";
}
function isRainy(c) { return [51,53,55,61,63,65,66,67,80,81,82,95,96,99].includes(c); }

/* ─ 服装ロジック（寒がり・暑がり分け） ─ */
function getOutfitBoth(temp, rain, wind) {
  // 寒がり派（+2℃感覚）
  const cold = getOutfitForTemp(temp - 2, rain, wind);
  // 暑がり派（-2℃感覚）
  const hot  = getOutfitForTemp(temp + 2, rain, wind);
  return { cold, hot };
}

function getOutfitForTemp(t, rain, wind) {
  let clothes = [], items = [];
  if (t >= 30)      { clothes = [{ i:"👕","t":"半袖"}, {i:"🧢","t":"帽子"}];                      items = [{i:"💧","t":"水分補給"},{i:"🧴","t":"日焼け止め"}]; }
  else if (t >= 25) { clothes = [{i:"👕","t":"半袖"}, {i:"🧥","t":"薄手の羽織り"}];               items = [{i:"💧","t":"水分補給"}]; }
  else if (t >= 20) { clothes = [{i:"👔","t":"長袖"}, {i:"🧥","t":"羽織り"}];                     items = []; }
  else if (t >= 15) { clothes = [{i:"👔","t":"長袖"}, {i:"🧥","t":"薄手ジャケット"}];             items = []; }
  else if (t >= 10) { clothes = [{i:"🧶","t":"ニット"}, {i:"🧥","t":"ジャケット"}];               items = [{i:"🧣","t":"マフラー"}]; }
  else              { clothes = [{i:"🧥","t":"コート"}, {i:"🧶","t":"厚手のニット"}];             items = [{i:"🧤","t":"手袋"},{i:"🧣","t":"マフラー"}]; }
  if (rain >= 40) items.push({i:"☂️","t":"折りたたみ傘"});
  if (wind >= 8)  clothes.push({i:"🧥","t":"防風アウター"});
  return { clothes, items };
}

function outLabel(t) {
  if(t>=30)return"半袖一択でしょ！";if(t>=25)return"半袖が気持ちいい〜";
  if(t>=20)return"長袖かな？悩むね〜";if(t>=15)return"しっかり長袖で";
  if(t>=10)return"ニット＆ジャケット推奨";return"コートの出番です！";
}
function subLabel(t, r) {
  if(r>=40)return"傘は絶対持っといてね";if(t>=30)return"熱中症、ほんま気をつけて";
  if(t>=25)return"朝晩はちょい涼しいかも";if(t>=20)return"寒暖差に要注意やで";
  if(t>=15)return"朝晩はひんやりするで";return"外出は防寒バッチリで！";
}

function getSpots(t,c){if(isRainy(c))return SPOTS.rainy;if(t>=27)return SPOTS.hot;if(t<=12)return SPOTS.cold;return SPOTS.pleasant;}

function getIdx(t,c,w,h){
  const r=isRainy(c);
  return{
    hs:t>=35?5:t>=32?4:t>=28?3:t>=24?2:1,
    la:r?1:h>80?2:w>5?5:t>22?4:3,
    wk:r?1:t>=35?2:t>=30?3:t>=12?5:3,
    ex:r?2:t>=33?1:t>=28?3:t>=10?5:3,
  };
}
function starsHTML(n,col){let s="";for(let i=1;i<=5;i++)s+=`<span class="star" style="color:${i<=n?col:"rgba(255,255,255,.2)"}">\u2605</span>`;return s;}
function setStatus(t){const el=document.getElementById("status-text");if(el)el.textContent=t;}

/* ─ AI フォールバック（ユーモア版） ─ */
function aiCommentFallback(w) {
  const wl = wLabel(w.code);
  if(isRainy(w.code)) return `今日は${wl}です☔ 傘なしで出たら確実に後悔するやつ。ひょうたんせんぱいも「折りたたみ傘、鞄に入れといてや〜」って言うてます。富田川も今日はいつもより元気かもね。`;
  if(w.temp>=33) return `気温${w.temp}℃！これは上富田も本気の夏や〜🔥 ひょうたんせんぱいも「外おるだけで焼けるで！」って警告中。水分は多めに、日陰に逃げながら行動しよう。熊野の木陰が恋しくなる日ですね。`;
  if(w.temp>=27) return `今日は${w.temp}℃、${wl}の上富田町です☀️ ひょうたんせんぱいが「富田川に行こうや〜！」ってウキウキしてます。日焼け止め忘れずに！暑さ対策バッチリなら最高の一日になりますよ。`;
  if(w.temp>=20) return `${w.temp}℃で${wl}〜ちょうどええやん！🌿 ひょうたんせんぱいが「今日は熊野古道の日やで」って言うてます。上富田はこのくらいが一番気持ちええんよね。散歩に出かけてみては？`;
  if(w.temp>=13) return `今日は${w.temp}℃、少し肌寒いですね🍂 ひょうたんせんぱいも「一枚多めに着てや〜」って言うてます。でもこれくらいが富田川沿いのお散歩には気持ちええんよね。温かい飲み物も忘れずに。`;
  return `${w.temp}℃はなかなか寒いで〜❄️ ひょうたんせんぱいも今日はコートの中から顔だけ出してます。道の駅くちくまので温かい地元グルメを食べて、しっかり体を温めてお出かけください！`;
}

/* ─ 天気取得 ─ */
async function fetchWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
    + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m`
    + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max`
    + `&timezone=Asia%2FTokyo&forecast_days=2`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

/* ─ AI コメント取得 ─ */
async function fetchAIComment(w) {
  try {
    const res = await fetch("/api/comment", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({weatherData: w}),
    });
    if(!res.ok) throw new Error("api error");
    const data = await res.json();
    return data.comment || aiCommentFallback(w);
  } catch {
    return aiCommentFallback(w);
  }
}

/* ─ 描画 ─ */
function renderWeather(w) {
  const night = isNight();
  document.body.style.background = getBg(w.code, night);
  const acc = getAccent(w.code, night);

  document.getElementById("h-emoji").textContent  = wEmoji(w.code);
  document.getElementById("h-wlabel").textContent = wLabel(w.code);
  document.getElementById("h-temp").textContent   = w.temp + "°";
  document.getElementById("h-feels").textContent  = "体感 " + w.feels + "℃";
  document.getElementById("h-range").innerHTML    = "↑ " + w.maxTemp + "℃ &nbsp;|&nbsp; ↓ " + w.minTemp + "℃";
  document.getElementById("h-hum").textContent    = w.hum + "%";
  document.getElementById("h-rain").textContent   = w.rain + "%";
  document.getElementById("h-wind").textContent   = w.wind + "m/s";

  // 服装（寒がり・暑がり）
  document.getElementById("out-main").textContent = outLabel(w.temp);
  document.getElementById("out-sub").textContent  = subLabel(w.temp, w.rain);

  const both = getOutfitBoth(w.temp, w.rain, w.wind);
  document.getElementById("outfit-cold").innerHTML =
    both.cold.clothes.map(it=>`<div class="outfit-item"><span class="outfit-item-icon">${it.i}</span>${it.t}</div>`).join("")
    + both.cold.items.map(it=>`<div class="outfit-item" style="background:rgba(147,197,253,.2)"><span class="outfit-item-icon">${it.i}</span>${it.t}</div>`).join("");
  document.getElementById("outfit-hot").innerHTML =
    both.hot.clothes.map(it=>`<div class="outfit-item"><span class="outfit-item-icon">${it.i}</span>${it.t}</div>`).join("")
    + both.hot.items.map(it=>`<div class="outfit-item" style="background:rgba(252,211,77,.2)"><span class="outfit-item-icon">${it.i}</span>${it.t}</div>`).join("");

  // 持ち物（共通）
  const sharedItems = [];
  if(w.rain>=40) sharedItems.push({i:"☂️",t:"折りたたみ傘"});
  if(w.wind>=8)  sharedItems.push({i:"🌬️",t:"防風アウター"});
  const belongCard = document.getElementById("card-belong");
  if(sharedItems.length>0){
    belongCard.style.display="";
    document.getElementById("belong-list").innerHTML =
      sharedItems.map(it=>`<div class="belong-item"><span class="belong-dot" style="background:${acc}"></span><span class="belong-txt">${it.i} ${it.t}</span></div>`).join("");
  } else {
    belongCard.style.display="none";
  }

  // スポット
  const spots = getSpots(w.maxTemp, w.code);
  document.getElementById("spots-list").innerHTML = spots
    .map(s=>`<div class="spot-card"><div class="spot-icon">${s.i}</div><div><div class="spot-name">${s.n}</div><div class="spot-reason">${s.r}</div></div></div>`)
    .join("");

  // 上富田情報
  document.getElementById("kamitonda-info").innerHTML = KAMITONDA_INFO
    .map(info=>`<div class="info-item"><div class="info-icon">${info.i}</div><div><div class="info-title">${info.title}</div><div class="info-body">${info.body}</div></div></div>`)
    .join("");

  // 指数
  const idx = getIdx(w.temp, w.code, w.wind, w.hum);
  document.getElementById("idx-grid").innerHTML = [
    ["🌡️","熱中症",idx.hs,"#f87171"],
    ["🧺","洗濯",  idx.la,"#60a5fa"],
    ["🚶","散歩",  idx.wk,"#34d399"],
    ["🏃","運動",  idx.ex,"#fbbf24"],
  ].map(([ic,lb,v,c])=>`<div class="idx-item"><div class="idx-icon">${ic}</div><div class="idx-lbl">${lb}</div><div>${starsHTML(v,c)}</div></div>`).join("");

  // 明日
  const diff = w.tMax2 - w.maxTemp;
  document.getElementById("tmr-high").textContent = "↑ " + w.tMax2 + "℃";
  document.getElementById("tmr-low").textContent  = "↓ " + w.tMin2 + "℃";
  document.getElementById("tmr-diff").textContent = diff>0?`明日は今日より${Math.abs(diff)}℃高くなりそう🌡️`:diff<0?`明日は今日より${Math.abs(diff)}℃下がるで🍃`:"明日は今日とほぼ同じ気温かな〜";
  document.getElementById("tmr-hint").textContent = outLabel(w.tMax2) + "の日になりそうです。";

  // Footer
  const now = new Date().toLocaleString("ja-JP",{month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"});
  document.getElementById("footer-text").textContent = "Open-Meteo · " + now + " 取得";
}

/* ─ メイン ─ */
async function init() {
  try {
    setStatus("ひょうたんせんぱいが天気を調べてるよ〜");
    const data  = await fetchWeather();
    const cur   = data.current, daily = data.daily;
    const w = {
      temp:    Math.round(cur.temperature_2m),
      feels:   Math.round(cur.apparent_temperature),
      hum:     Math.round(cur.relative_humidity_2m),
      code:    cur.weather_code,
      wind:    Math.round(cur.wind_speed_10m*10)/10,
      maxTemp: Math.round(daily.temperature_2m_max[0]),
      minTemp: Math.round(daily.temperature_2m_min[0]),
      rain:    daily.precipitation_probability_max[0],
      tMax2:   Math.round(daily.temperature_2m_max[1]),
      tMin2:   Math.round(daily.temperature_2m_min[1]),
    };

    renderWeather(w);
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";

    setStatus("AIコメント生成中…");
    const aiText = await fetchAIComment(w);
    const aiEl = document.getElementById("ai-text");
    if(aiEl) aiEl.textContent = aiText;

  } catch(e) {
    document.getElementById("loading").style.display = "none";
    const ev = document.getElementById("error-view");
    ev.style.display = "flex";
    document.getElementById("err-body").textContent = "通信を確認してね。\n(" + (e.message||"不明") + ")";
  }
}

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("/sw.js").catch(()=>{}); });
